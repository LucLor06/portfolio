    <p class="text--center nav__header"><b>Projects</b></p>
    {% for project in projects %}
    <a hx-get="{{ project.get_absolute_url }}">
        <img src="{{ project.icon }}">
        <p>{{ project.name }}</p>
    </a>
    {% endfor %}
